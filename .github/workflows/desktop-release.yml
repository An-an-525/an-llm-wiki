name: desktop-release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: '本次桌面版更新说明'
        required: false
        type: string
  push:
    tags:
      - 'an-study-room-v*'

permissions:
  contents: read

jobs:
  build-windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: site
    env:
      AN_STUDY_ROOM_PUBLIC_BASE_URL: ${{ vars.AN_STUDY_ROOM_PUBLIC_BASE_URL || 'https://an520.xin/study-room' }}
      AN_STUDY_ROOM_RELEASE_NOTES: ${{ inputs.release_notes || format('桌面版构建于 {0}', github.ref_name) }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install dependencies
        run: npm ci

      - name: Build signed desktop release
        run: npm run desktop:build

      - name: Upload desktop release bundle
        uses: actions/upload-artifact@v4
        with:
          name: an-study-room-desktop-${{ github.run_number }}
          if-no-files-found: error
          path: |
            site/public/downloads/*.exe
            site/public/downloads/*.sig
            site/public/downloads/release.json
            site/public/updates/latest.json
