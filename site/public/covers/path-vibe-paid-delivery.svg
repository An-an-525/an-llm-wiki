      <stop offset="0" stop-color="#FBFAF7"/>
      <stop offset="0.48" stop-color="#F5EDE8"/>
      <stop offset="1" stop-color="#E8DDD4"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3D342E"/>
      <stop offset="1" stop-color="#6B4F3E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#43342B" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <path d="M80 110H1120M80 210H1120M80 310H1120M80 410H1120M80 510H1120M80 610H1120" stroke="#D8C6B8" stroke-width="1" opacity="0.36"/>
